    <script>
        // রাইট ক্লিক বন্ধ করার সঠিক ফাংশন
        function disableClick() {
            document.oncontextmenu = function(event) {
                alert('Privacy Protection: Right click is disabled.');
                return false;
            };
        }

        // চ্যানেল পরিবর্তনের ফাংশন
        function changeChannel(url) {
            // প্লেয়ার ফ্রেমের সোর্স পরিবর্তন
            const playerFrame = document.getElementsByName('player')[0];
            playerFrame.src = "http://rslivetv.wuaze.com/RS.html?url=" + url;
        }
    </script>

    </head>

<body onLoad="disableClick()">

    <div class="container tv-area">

                </div>
            </div>

            <div class="col-xs-12 col-md-2 channel-list">
                <ul class="thumbnail-slider" style="list-style: none; padding: 0;">
