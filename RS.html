<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rs Live Tv - Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        #player { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="player"></div>

    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@clappr/hlsjs-playback@latest/dist/hlsjs-playback.min.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let m3u8Url = urlParams.get('url');
        
        // CORS Proxy যুক্ত করা (যদি লিঙ্ক থাকে)
        if (m3u8Url) {
            // প্রক্সি ব্যবহার করে লিঙ্কটিকে রি-রুট করা
            const proxiedUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(m3u8Url);

            const player = new Clappr.Player({
                source: proxiedUrl, // এখানে প্রক্সি করা লিঙ্কটি ব্যবহার হচ্ছে
                parentId: '#player',
                plugins: [HlsjsPlayback],
                autoPlay: true,
                mute: true,
                width: '100%',
                height: '100%',
                mimeType: 'application/x-mpegURL',
                playback: {
                    hlsjsConfig: {
                        enableWorker: true,
                    }
                }
            });

            // প্লেয়ারে এরর হ্যান্ডলিং
            player.on(Clappr.Events.PLAYER_ERROR, function(e) {
                console.error('প্লে হতে সমস্যা হচ্ছে:', e);
                // যদি প্রক্সি দিয়েও না চলে, তবে সরাসরি চেষ্টা করা
                player.load(m3u8Url); 
            });

        } else {
            document.body.innerHTML = '<h2 style="color:white; text-align:center; margin-top:20%;">Link Not Found!</h2>';
        }
    </script>
</body>
</html>
